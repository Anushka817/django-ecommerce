{% extends 'base.html' %}

{% block content %}

<h2>Our Products</h2>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

{% for product in products %}

<div style="border:1px solid #ddd; padding:15px; width:220px; text-align:center">

<img src="{{ product.image.url }}" width="200">

<h3>{{ product.name }}</h3>

<p>₹{{ product.price }}</p>

<a href="/cart/add/{{ product.id }}/">Add to Cart</a>
<a href="/wishlist/add/{{ product.id }}/">❤️ Wishlist</a>
</div>

{% endfor %}

</div>

{% endblock %}
