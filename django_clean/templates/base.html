<!DOCTYPE html>
<html>
<head>
    <title>AnuLuxe Store</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        header{
            background:#222;
            color:white;
            padding:15px;
        }

        nav a{
            color:white;
            margin-right:15px;
            text-decoration:none;
            font-weight:bold;
        }

        nav a:hover{
            text-decoration:underline;
        }

        .container{
            padding:20px;
        }

        .search-box{
            margin-top:10px;
        }

        input[type="text"]{
            padding:8px;
            width:250px;
        }

        button{
            padding:8px 15px;
            background:#007bff;
            border:none;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:10px;
            margin-top:40px;
        }
    </style>
</head>

<body>

<header>

<h1>AnuLuxe Store</h1>

<nav>
<a href="/">Home</a>
<a href="/cart/">Cart</a>
<a href="/orders/history/">Orders</a>
<a href="/login/">Login</a>
</nav>

<div class="search-box">
<form method="GET" action="/">
<input type="text" name="q" placeholder="Search jewellery...">
<button type="submit">Search</button>
</form>
</div>

</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

<footer>
<p>© 2026 AnuLuxe Store</p>
</footer>

</body>
</html>
