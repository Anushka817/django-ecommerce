{% extends 'base.html' %}

{% block content %}

<h2>Checkout</h2>

<table class="table table-striped">
    {% for item in items %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>₹{{ item.subtotal }}</td>
    </tr>
    {% endfor %}
</table>

<h4>Total Amount: ₹{{ total }}</h4>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-primary">Place Order</button>
</form>

{% endblock %}
