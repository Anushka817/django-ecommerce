{% extends 'base.html' %}

{% block content %}

<h2>Your Orders</h2>

{% for order in orders %}

<div style="border:1px solid gray; padding:10px; margin:10px;">
    <p>Product: {{ order.product.name }}</p>
    <p>Quantity: {{ order.quantity }}</p>
    <p>Total: ₹{{ order.total_price }}</p>
</div>

{% endfor %}

{% endblock %}
